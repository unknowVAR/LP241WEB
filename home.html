<!DOCTYPE html>
<html lang="fr"><head>
    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">    <title>Maquettes de Sites de Restaurants</title>
    <style>
        .carousel-item {
            text-align: center;
        }        .price {
            font-size: 1.5em;
            color: #28a745;
        }    </style>
</head>
<body>
<div class="container mt-5">    <h1 class="text-center">Maquettes de Sites de Restaurants</h1>
    <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">        <div class="carousel-inner">            <div class="carousel-item active">                <img src="maquette1.jpg" class="d-block w-100" alt="Maquette 1">                <div class="carousel-caption d-none d-md-block">                    <h5>Restaurant Simple</h5>
                    <p class="price">Prix: 5000F</p>
                </div>
            </div>
            <div class="carousel-item">                <img src="maquette2.jpg" class="d-block w-100" alt="Maquette 2">                <div class="carousel-caption d-none d-md-block">                    <h5>Pizzeria Classique</h5>
                    <p class="price">Prix: 15000F</p>
                </div>
            </div>
            <div class="carousel-item">                <img src="maquette3.jpg" class="d-block w-100" alt="Maquette 3">                <div class="carousel-caption d-none d-md-block">                    <h5>Restaurant Haut de Gamme</h5>
                    <p class="price">Prix: 100000F</p>
                </div>
            </div>
        </div>
        <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Précédent</span>
        </a>
        <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Suivant</span>
        </a>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
